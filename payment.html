<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Gateway</title>

        <!-- Favicon -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

        <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

    <style>
        /* ---------- Base ---------- */
                body {
            font-family: Georgia, serif;
            margin: 0;
            color: #fff;
display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
background: linear-gradient(135deg, #0d0f1a, #050608);
            overflow-x: hidden;
        }
        button { cursor: pointer; }
        a { color: inherit; text-decoration: none; font-weight: bold; }

        /* ---------- Floating Background ---------- */
        #floating-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at bottom, #1a0d3a, #0d0d0d);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticles linear infinite;
            box-shadow: 0 0 10px #6b2cd8, 0 0 20px #6b2cd8;
        }

        @keyframes floatParticles {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ---------- Content ---------- */
        #content {
            position: relative;
            z-index: 1;
            padding: 30px;
            max-width: 1100px;
            margin: auto;
            padding-bottom: 40px;
        }

/* --- Container Glass Panel --- */
#payment-container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 40px 50px;
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 0 60px rgba(255,0,255,0.1);
  text-align: center;
  max-width: 400px;
  width: 90%;
  animation: pulseGlow 3s infinite alternate;
}

/* --- Neon Glow Animation --- */
@keyframes pulseGlow {
  0% { box-shadow: 0 0 20px rgba(0,255,255,0.2), 0 0 40px rgba(255,0,255,0.1); }
  50% { box-shadow: 0 0 30px rgba(0,255,255,0.4), 0 0 60px rgba(255,0,255,0.2); }
  100% { box-shadow: 0 0 25px rgba(0,255,255,0.3), 0 0 50px rgba(255,0,255,0.15); }
}

/* --- Headings & Status --- */
#status {
  font-size: 1.2rem;
  margin-bottom: 20px;
  color: #0ff; /* neon cyan */
  text-shadow: 0 0 8px #0ff, 0 0 12px #0ff;
  transition: all 0.3s ease-in-out;
}

#amount {
  font-weight: bold;
  font-size: 1.8rem;
  color: #ff3fff;
  text-shadow: 0 0 10px #ff3fff, 0 0 20px #ff3fff;
}

p {
  margin: 12px 0;
  font-size: 1rem;
  letter-spacing: 0.5px;
}

/* --- Wallet Address Styling --- */
p + p {
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  color: #0ff;
  text-shadow: 0 0 6px #0ff;
  word-break: break-all;
}

/* --- Glowing Button (Optional) --- */
#check-btn {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 1rem;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(45deg, #0ff, #ff3fff);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 8px #0ff, 0 0 16px #ff3fff;
  transition: all 0.3s ease-in-out;
}

#check-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #0ff, 0 0 24px #ff3fff;
}
        /* ---------- Footer ---------- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 18px 0;
            font-size: 14px;
            color: #aaa;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.4);
            z-index: 6;
        }
    </style>
</head>

<body>
    <div id="floating-bg"></div>

<header style="text-align: center; padding: 40px 0;">
  <div style="
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 300px;                /* slightly bigger frame */
      height: 180px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);  /* a little more visible */
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3); /* stronger border */
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);  /* deeper shadow */
      margin: 0 auto;
    ">
    <img src="assets/pictures/imagitool-export (26).jpg" 
         alt="AvalonFlow Logo" 
         style="max-width: 90%; max-height: 90%; height: auto;">
  </div>
</header>

<div id="payment-container">
  <p id="status">Waiting for payment...</p>
  <p>Send exactly: <span id="amount"></span> USDT or USDC</p>
  <p>Wallet: 0x63d93f4348b109492d75aaaf10ac374d448178cd</p>
  <!-- Optional manual check button -->
  <button id="check-btn" onclick="checkPayment()">Check Payment</button>
</div>

<script>
const wallet = "0x63d93f4348b109492d75aaaf10ac374d448178cd";
const apiKey = "R53TCHYDZ9W1GJ4N861427HN52APJ5DZNI"; // your Etherscan API key

// ERC20 contracts
const tokens = {
  USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7",
  USDC: "0xA0b86991c6218b36c1d19d4a2e9eb0ce3606eb48"
};

// 1️⃣ Generate unique payment amount
const baseAmount = 400.20;
const randomDecimal = Math.floor(Math.random()*10000)/10000;
const expectedAmount = (baseAmount + randomDecimal).toFixed(4);
document.getElementById("amount").innerText = expectedAmount;

// 2️⃣ Save page load time to ignore old transactions
const pageLoadTime = Math.floor(Date.now() / 1000); // unix timestamp in seconds

// 3️⃣ Check blockchain for payment
async function checkPayment(){
  for (let token in tokens){
    let contract = tokens[token];
    let url = `https://api.etherscan.io/api?module=account&action=tokentx&address=${wallet}&contractaddress=${contract}&sort=desc&apikey=${apiKey}`;

    try{
      let res = await fetch(url);
      let data = await res.json();
      if(data.status !== "1") continue;

      for(let tx of data.result){
        let amount = tx.value / 1e6; // USDT/USDC use 6 decimals
        let txTime = parseInt(tx.timeStamp || 0); // tx timestamp
        let confirmations = parseInt(tx.confirmations || 1);

        if(
          tx.to.toLowerCase() === wallet.toLowerCase() &&
          parseFloat(amount).toFixed(4) === expectedAmount &&
          txTime > pageLoadTime &&
          confirmations >= 1
        ){
          // Payment detected → redirect
          document.getElementById("status").innerText = "Payment detected. Redirecting...";
          setTimeout(()=>{ window.location.href="/login.html"; }, 1000);
          return;
        }
      }

    }catch(err){
      console.error("Error checking payment:", err);
    }
  }
}

// 4️⃣ Poll every 10 seconds
setInterval(checkPayment, 10000);
// Initial check immediately
checkPayment();

</script>
